name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match `packageManager` in root package.json.
          bun-version: 1.3.11

      - run: bun install

      - name: Text hygiene
        run: bun run check:text

      - name: Type check public packages
        run: bun run check:public

      - name: Test public packages
        run: bun run test:public

      - name: Lint public packages
        run: bun run lint:public

  full-check:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop

      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match `packageManager` in root package.json.
          bun-version: 1.3.11

      - run: bun install

      - name: Text hygiene
        run: bun run check:text

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint
