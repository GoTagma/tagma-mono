name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Full repository gate: every check, lint, and test the repo runs on push
  # to main. Triggers on:
  #   - push to main
  #   - pull_request from a branch in the same repository.
  # Required so that any change which can affect apps/electron, apps/editor
  # or anything depending on them is gated before merge, not after.
  full-check:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match `packageManager` in root package.json.
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - name: Text hygiene
        run: bun run check:text

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint

  # Degraded gate for fork PRs: keep untrusted forks on public packages only.
  # `full-check` still runs once a maintainer pulls the change into a same-repo
  # branch.
  public-check-fork:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match `packageManager` in root package.json.
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - name: Text hygiene
        run: bun run check:text

      - name: Type check public packages
        run: bun run check:public

      - name: Test public packages
        run: bun run test:public

      - name: Lint public packages
        run: bun run lint:public
