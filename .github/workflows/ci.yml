name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match `packageManager` in root package.json.
          bun-version: 1.3.11

      - run: bun install

      - name: Type check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint
