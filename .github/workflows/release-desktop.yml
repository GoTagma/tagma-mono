name: Release Desktop

# Atomic-on-success design: the version bump, changelog commit, submodule
# pointer bump, git tag, and GitHub Release are all deferred to the very last
# job (`finalize`). If ANY step before finalize fails — build, publish,
# hash-verify, electron-builder — no commit and no tag ever touches
# tagma-desktop/main or tagma-mono/main, so there's nothing to roll back and
# the next run starts from the same base version as if this run never happened.
#
# Flow:
#   prepare   → compute new version, write package.json + CHANGELOG onto the
#               runner only, upload as an artifact. No commit.
#   build     → matrix (mac/linux/win). Pins submodule to prepare's captured
#               apps SHA, overlays the prepared package.json + CHANGELOG, then
#               runs electron-builder. Artifacts uploaded per-platform.
#   publish   → flatten + hash-verify artifacts, build hot-update manifest and
#               release notes. Nothing is tagged or released yet.
#   finalize  → commit+push the version bump into tagma-desktop/main, bump
#               submodule pointer + tag `desktop-v<ver>` into tagma-mono/main,
#               create the GitHub Release pinned to that tag.
#   sync-web  → sync archive entry + manifest into tagma-web (unchanged).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        options: [patch, minor, major]
        default: patch
      channel:
        description: 'Release channel'
        type: choice
        options: [alpha, beta, rc, stable, patch]
        default: alpha
      expected_apps_sha:
        description: 'Optional: tagma-desktop/main SHA you expect to release (7+ chars or full). Aborts if origin/main has moved since. Leave empty to accept current HEAD.'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  # Compute the new version and stage it into an artifact. No writes to any
  # remote — if any later job fails, prepare's outputs simply get discarded
  # when the run is deleted.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      apps_sha: ${{ steps.sync.outputs.apps_sha }}
      prev_tag: ${{ steps.prev.outputs.prev_tag }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop

      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match `packageManager` in root package.json. Avoid
          # `latest` so a freshly published Bun build with a broken
          # cross-target runtime (e.g. v1.3.12 windows-x64-baseline extract
          # failure) can't take the release pipeline down without warning.
          bun-version: 1.3.11

      # The submodule was checked out at whatever SHA mono's main currently
      # pins, which may lag tagma-desktop/main. Fast-forward to the latest so
      # the build runs against real HEAD and finalize's submodule-pointer
      # bump lands on a reviewed commit.
      - name: Sync submodule to latest tagma-desktop/main
        id: sync
        run: |
          git -C apps fetch origin main
          git -C apps checkout main
          git -C apps reset --hard origin/main
          apps_sha=$(git -C apps rev-parse HEAD)
          echo "tagma-desktop/main is at $apps_sha"
          echo "apps_sha=$apps_sha" >> "$GITHUB_OUTPUT"

      # Optional tripwire: operator passes a SHA from their local `git -C apps
      # rev-parse main` before clicking Run workflow. If anyone else pushed to
      # tagma-desktop/main between that check and this job, the reset above
      # would silently pull in the extra commits. Fail instead so the operator
      # can review the new commits and re-trigger with an updated SHA.
      - name: Verify tagma-desktop/main matches expected SHA
        if: inputs.expected_apps_sha != ''
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ inputs.expected_apps_sha }}"
          n=${#expected}
          if [ "$n" -lt 7 ]; then
            echo "expected_apps_sha must be at least 7 chars (got: '$expected')"
            exit 1
          fi
          actual=$(git -C apps rev-parse HEAD)
          if [ "${actual:0:$n}" != "$expected" ]; then
            echo "tagma-desktop/main HEAD is $actual"
            echo "expected                  $expected"
            echo ""
            echo "Someone pushed to tagma-desktop/main after you captured the"
            echo "expected SHA. Inspect the new commits and re-run the workflow"
            echo "with the updated SHA, or leave expected_apps_sha empty to"
            echo "accept the current HEAD unconditionally."
            exit 1
          fi
          echo "tagma-desktop/main @ $actual matches expected $expected"

      # Record the previous desktop-v* tag now so publish's min-shell gate
      # has a stable reference even if someone pushes an unrelated tag
      # between prepare and publish.
      - name: Find previous desktop-v tag
        id: prev
        shell: bash
        run: |
          set -euo pipefail
          prev_tag=$(git tag --list 'desktop-v*' --sort=-version:refname | head -1 || true)
          echo "previous tag: ${prev_tag:-<none>}"
          echo "prev_tag=$prev_tag" >> "$GITHUB_OUTPUT"

      - name: Bump desktop version
        id: bump
        working-directory: apps/electron
        run: |
          bun pm version ${{ inputs.bump }} --no-git-tag-version
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Write the release channel into tagma.channel so the packaged
      # installer polls the correct hot-update manifest URL
      # (editor-updates/<channel>/manifest.json). Without this, every
      # installer — including alpha/beta builds — would stay on the default
      # "stable" channel from the checked-in package.json and never see
      # prerelease hot-updates. `patch` collapses to `stable` for the same
      # reason channel-info.mjs does: a patch release must reach stable
      # installers, not a phantom "patch" channel.
      - name: Pin release channel into package.json
        working-directory: apps/electron
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            p.tagma = p.tagma || {};
            const raw = process.env.INPUT_CHANNEL;
            p.tagma.channel = raw === 'patch' ? 'stable' : raw;
            fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Scaffold changelog entry
        run: |
          version="${{ steps.bump.outputs.version }}"
          date=$(date -u +%Y-%m-%d)
          mkdir -p apps/electron/CHANGELOG
          file="apps/electron/CHANGELOG/${version}.md"
          if [ ! -f "$file" ]; then
            cat > "$file" <<EOF
          ---
          version: "${version}"
          date: "${date}"
          channel: "${{ inputs.channel }}"
          ---
          EOF
          fi

      # Ship the staged package.json + changelog as an artifact; the build
      # job overlays it onto its own checkout, and finalize commits it to
      # tagma-desktop. The artifact is the single source of truth for the
      # version bump across all downstream jobs.
      - name: Upload prepared bump
        uses: actions/upload-artifact@v6
        with:
          name: prepared
          path: |
            apps/electron/package.json
            apps/electron/CHANGELOG/${{ steps.bump.outputs.version }}.md
          if-no-files-found: error

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop

      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      # Re-pin the submodule to exactly what prepare resolved — the mono
      # checkout brought us to whatever SHA is currently committed, which
      # usually lags tagma-desktop/main. Without this, the three matrix
      # runners could build against three different apps SHAs if someone
      # pushes to tagma-desktop/main mid-build.
      - name: Pin apps submodule to prepared SHA
        shell: bash
        run: |
          set -euo pipefail
          apps_sha="${{ needs.prepare.outputs.apps_sha }}"
          git -C apps fetch --no-tags origin "$apps_sha" 2>/dev/null \
            || git -C apps fetch --no-tags origin
          git -C apps checkout "$apps_sha"
          echo "apps pinned to $apps_sha"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Clean build artifacts
        # Wipe any stale editor/dist and desktop-dist* from a previous workflow
        # run on the same runner VM. Without this, a Windows runner that ran
        # an earlier build would have a dirty editor/dist whose hash collides
        # with the fresh mac/linux builds — causing the publish hash check to
        # fire falsely. The `desktop-dist-*` glob covers per-arch sidecar
        # staging dirs from previous runs (darwin-arm64, darwin-x64, etc.).
        shell: bash
        run: |
          rm -rf apps/editor/dist apps/editor/desktop-dist apps/editor/desktop-dist-* apps/electron/dist

      - name: Download prepared bump
        uses: actions/download-artifact@v7
        with:
          name: prepared
          path: overlay

      # Overlay the new version + channel + changelog onto the runner's
      # working copy. Nothing gets committed — if this job (or any later
      # job) fails, the overlay evaporates with the runner.
      - name: Apply overlay
        shell: bash
        run: |
          set -euo pipefail
          cp overlay/package.json apps/electron/package.json
          mkdir -p apps/electron/CHANGELOG
          cp overlay/CHANGELOG/*.md apps/electron/CHANGELOG/
          version=$(node -p "require('./apps/electron/package.json').version")
          echo "overlay applied; apps/electron version = $version"

      - name: Install deps
        run: bun install

      - name: Switch Bun to baseline runtime (Windows)
        # Bun's own cross-target download fails consistently on Windows GitHub
        # runners with "Failed to extract executable for bun-windows-x64-baseline".
        # The published asset is fine — we verified the zip downloads and unzips
        # cleanly via curl. Replace setup-bun's modern bun.exe with the baseline
        # variant ourselves. After this swap host == target, so Bun.build's
        # cross-target fetch in build-desktop-sidecar.ts becomes a no-op.
        if: matrix.platform == 'win'
        shell: bash
        run: |
          set -euo pipefail
          BUN_VERSION=$(bun --revision | cut -d+ -f1)
          TARGET="bun-windows-x64-baseline"
          URL="https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/${TARGET}.zip"
          echo "Pre-fetching $URL"
          curl -fsSL --retry 3 --retry-delay 5 "$URL" -o /tmp/bun-baseline.zip
          unzip -oq /tmp/bun-baseline.zip -d /tmp/bun-baseline-extracted
          BUN_BIN="$HOME/.bun/bin/bun.exe"
          cp "/tmp/bun-baseline-extracted/${TARGET}/bun.exe" "$BUN_BIN"
          "$BUN_BIN" --revision
          echo "Bun runtime swapped to ${TARGET}-v${BUN_VERSION}"

      - name: Build desktop prerequisites
        # Bun's cross-target compile occasionally lands a truncated zip in its
        # cache and dies with "Failed to extract executable" before the script
        # can catch it. Retry up to 3 times, wiping any stale baseline cache
        # entries between attempts.
        shell: bash
        run: |
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            echo "── build:desktop attempt $attempt/$max ──"
            if bun run build:desktop; then
              echo "build:desktop succeeded on attempt $attempt"
              exit 0
            fi
            echo "build:desktop attempt $attempt failed"
            if [ "$attempt" -lt "$max" ]; then
              find "$HOME/.bun" -maxdepth 6 \( -iname "bun-*-baseline-v*" -o -iname "bun-windows-x64-v*" -o -iname "bun-linux-x64-v*" \) -print -exec rm -rf {} + 2>/dev/null || true
              sleep $((attempt * 5))
            fi
            attempt=$((attempt + 1))
          done
          echo "build:desktop exhausted retries"
          exit 1

      # Pre-stage the opencode binary into build/opencode/<platform>-<arch>/
      # so electron-builder's extraResources entry picks it up when packaging.
      # Without this the installer ships zero opencode binaries — the runtime
      # resolver falls through to PATH and hits whatever stale bun/npm shim
      # the user has lying around (the motivating failure: "Cannot find
      # module .../.bun/install/global/node_modules/opencode-ai/bin/opencode").
      # The `dist:<os>` scripts in apps/electron/package.json chain this
      # step in for local packaging, but CI invokes `electron-builder`
      # directly and needs it explicit.
      - name: Stage bundled opencode binary
        working-directory: apps/electron
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            mac)
              # electron-builder builds both arm64 and x64 dmgs; each picks
              # its arch-specific staged dir via `${arch}` in extraResources.
              bun ./scripts/fetch-opencode.mjs --platform=darwin --arch=arm64
              bun ./scripts/fetch-opencode.mjs --platform=darwin --arch=x64
              ;;
            linux)
              bun ./scripts/fetch-opencode.mjs --platform=linux --arch=x64
              ;;
            win)
              bun ./scripts/fetch-opencode.mjs --platform=win32 --arch=x64
              ;;
            *)
              echo "unknown matrix.platform: ${{ matrix.platform }}"
              exit 1
              ;;
          esac

      # macOS electron-builder produces BOTH arm64 and x64 dmgs from a single
      # run. Without a second sidecar compile, both dmgs would embed whichever
      # arch the runner built (currently arm64 on macos-latest), leaving
      # darwin-x64 users with a bundled sidecar that won't launch. Cross-
      # compile the other arch into a per-arch staging dir so electron-builder
      # can pick up desktop-dist-${arch} per-target.
      - name: Cross-compile macOS sidecar for the non-host arch
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail
          host_arch=$(node -p "process.arch")
          case "$host_arch" in
            arm64) other_arch="x64" ; other_target="bun-darwin-x64" ;;
            x64)   other_arch="arm64" ; other_target="bun-darwin-arm64" ;;
            *) echo "unexpected mac runner arch: $host_arch" ; exit 1 ;;
          esac
          echo "host=$host_arch → cross-compiling $other_target → desktop-dist-$other_arch"
          cd apps/editor
          # build:sidecar already has its own retry-with-cache-purge loop; CI=true
          # is inherited. Override the target and outdir to land the binary in a
          # separate per-arch dir so the first (host-arch) build isn't clobbered.
          TAGMA_BUN_COMPILE_TARGET="$other_target" \
          TAGMA_SIDECAR_OUTDIR="desktop-dist-$other_arch" \
            bun run build:sidecar

      # Cross-compile a Linux arm64 sidecar so the hot-update manifest can
      # advertise linux/arm64 alongside x64. electron-builder only packages
      # linux-x64 in this matrix (no arm64 installer yet), so this binary
      # is purely a hot-update asset — useful for users running the x64
      # AppImage under emulation or rolling their own arm64 install.
      - name: Cross-compile Linux arm64 sidecar (hot-update only)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          cd apps/editor
          TAGMA_BUN_COMPILE_TARGET="bun-linux-arm64" \
          TAGMA_SIDECAR_OUTDIR="desktop-dist-arm64" \
            bun run build:sidecar

      # Stage per-arch sidecar dirs so electron-builder's extraResources entry
      # "../editor/desktop-dist-${arch}" finds a sidecar for every arch it's
      # packaging. Linux/Windows matrix legs only ship one arch, but the
      # helper is idempotent on pre-populated per-arch dirs so the mac run
      # above stays intact.
      - name: Stage per-arch sidecar dirs
        shell: bash
        working-directory: apps/electron
        run: |
          set -euo pipefail
          case "${{ matrix.platform }}" in
            mac)   node ./scripts/stage-sidecar.mjs arm64 x64 ;;
            *)     node ./scripts/stage-sidecar.mjs x64 ;;
          esac

      # Codesign the sidecar binaries so both the installer-bundled copy and
      # the standalone hot-update asset satisfy Gatekeeper on first launch.
      # A raw unsigned Mach-O downloaded to userData will fail to spawn on
      # macOS 10.15+ because Gatekeeper treats non-notarized/unsigned binaries
      # as untrusted when Electron spawns them via child_process.
      #
      # Gated on TAGMA_SIGN_SIDECAR=1 (off by default) so the initial rollout
      # doesn't change existing release behavior until the operator has
      # verified the keychain import flow end-to-end. CSC_LINK /
      # CSC_KEY_PASSWORD are already used by electron-builder below; reusing
      # those secrets keeps the identity consistent between the bundled and
      # hot-update copies. Notarization of the standalone binary is a separate
      # follow-up (notarytool requires a zip+staple round trip).
      - name: Sign sidecar binaries (macOS)
        if: matrix.platform == 'mac'
        env:
          TAGMA_SIGN_SIDECAR: ${{ secrets.TAGMA_SIGN_SIDECAR }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${TAGMA_SIGN_SIDECAR:-}" != "1" ]; then
            echo "TAGMA_SIGN_SIDECAR != 1 — skipping sidecar codesign (opt-in)"
            exit 0
          fi
          # Two modes based on which secrets are present:
          #   - Developer ID (CSC_LINK + CSC_KEY_PASSWORD): full codesign with
          #     timestamp + hardened runtime. What we want once a paid cert is
          #     available.
          #   - Ad-hoc fallback (no secrets): `codesign --sign -` produces a
          #     hash-only signature that macOS's dynamic loader accepts when a
          #     trusted process (the installed .app) spawns it via fork/exec.
          #     Sufficient for our hot-update path because the user never
          #     launches the sidecar directly. Does NOT satisfy Gatekeeper for
          #     quarantined downloads, but Node fetch doesn't set the quarantine
          #     xattr, so in practice this is enough. Upgrade to real signing
          #     by populating CSC_LINK / CSC_KEY_PASSWORD.
          mode="adhoc"
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ]; then
            mode="identity"
          fi
          echo "Sidecar codesign mode: $mode"

          if [ "$mode" = "identity" ]; then
            keychain="tagma-sidecar-sign.keychain"
            password="tagma-sign-$$"
            echo "$CSC_LINK" | base64 -d > /tmp/csc.p12
            security create-keychain -p "$password" "$keychain"
            security set-keychain-settings -lut 21600 "$keychain"
            security unlock-keychain -p "$password" "$keychain"
            security list-keychains -d user -s "$keychain" $(security list-keychains -d user | tr -d '"')
            security import /tmp/csc.p12 -k "$keychain" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$password" "$keychain" >/dev/null
            identity=$(security find-identity -v -p codesigning "$keychain" | awk -F'"' '/Developer ID Application/{print $2; exit}')
            if [ -z "$identity" ]; then
              echo "No Developer ID Application identity found in keychain — cannot sign sidecar"
              exit 1
            fi
            echo "Signing with identity: $identity"
            for f in apps/editor/desktop-dist-*/tagma-editor-server; do
              [ -f "$f" ] || continue
              codesign --force --sign "$identity" --timestamp --options runtime --keychain "$keychain" "$f"
              codesign --verify --verbose "$f"
            done
            rm -f /tmp/csc.p12
          else
            for f in apps/editor/desktop-dist-*/tagma-editor-server; do
              [ -f "$f" ] || continue
              codesign --force --sign - "$f"
              codesign --verify --verbose "$f"
            done
          fi

      - name: Sign sidecar binaries (Windows)
        if: matrix.platform == 'win'
        env:
          TAGMA_SIGN_SIDECAR: ${{ secrets.TAGMA_SIGN_SIDECAR }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${TAGMA_SIGN_SIDECAR:-}" != "1" ]; then
            echo "TAGMA_SIGN_SIDECAR != 1 — skipping sidecar signtool (opt-in)"
            exit 0
          fi
          # Windows doesn't have a meaningful ad-hoc sign equivalent to
          # macOS's `codesign --sign -`. SmartScreen only fires on user-
          # initiated launches of downloaded .exe files, not on CreateProcess
          # from within the signed parent .app. So when WIN_CSC secrets are
          # absent we skip cleanly instead of forcing a paid cert purchase.
          # Upgrade by populating WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD.
          if [ -z "${WIN_CSC_LINK:-}" ] || [ -z "${WIN_CSC_KEY_PASSWORD:-}" ]; then
            echo "WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD unset — skipping sidecar signtool (no paid cert required: sidecar spawn bypasses SmartScreen)"
            exit 0
          fi
          p12="$RUNNER_TEMP/win-csc.p12"
          echo "$WIN_CSC_LINK" | base64 -d > "$p12"
          # Resolve signtool.exe from the latest installed Windows SDK.
          signtool=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -name 'signtool.exe' 2>/dev/null | grep -E '/x64/signtool.exe$' | sort -V | tail -1)
          if [ -z "$signtool" ]; then
            echo "signtool.exe not found on runner — is the Windows 10 SDK installed?"
            exit 1
          fi
          for f in apps/editor/desktop-dist-*/tagma-editor-server.exe; do
            [ -f "$f" ] || continue
            "$signtool" sign //f "$p12" //p "$WIN_CSC_KEY_PASSWORD" //fd sha256 //tr http://timestamp.digicert.com //td sha256 "$f"
            "$signtool" verify //pa //v "$f"
          done
          rm -f "$p12"

      # Hash the editor dist tree on every runner and ship the digest in the
      # artifact. The publish job compares the three and fails if they
      # diverge — that protects the "one Linux-built hot-update tarball is
      # equivalent to what Windows/Mac installers bundle" assumption.
      - name: Hash editor dist (cross-OS verification)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/electron/release
          node scripts/release/hash-editor-dist.mjs apps/editor/dist > apps/electron/release/editor-dist.hash
          echo "editor-dist hash (${{ matrix.platform }}): $(cat apps/electron/release/editor-dist.hash)"

      # ── Hot-update payload ──
      # Every desktop release also ships an editor-dist tarball that the
      # running app can pull down on demand (see server/routes/editor.ts).
      # Built on Linux only: `bun run build:desktop` produces identical
      # apps/editor/dist on every runner (pure JS), so one tarball is
      # enough and we avoid publishing three byte-divergent copies.
      # The cross-OS hash check above enforces that invariant.
      - name: Package editor hot-update tarball
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          out="apps/electron/release"
          mkdir -p "$out"
          tarball="$out/editor-dist-${version}.tar.gz"
          tar -czf "$tarball" -C apps/editor/dist .
          sha=$(shasum -a 256 "$tarball" | awk '{print $1}')
          echo "$sha  $(basename "$tarball")" > "${tarball}.sha256"
          echo "wrote $tarball (sha256=$sha)"

      - name: Package sidecar hot-update binaries
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          out="apps/electron/release"
          mkdir -p "$out"
          node_platform=$(node -p "process.platform")
          # Enumerate every per-arch staging dir produced on this runner.
          # mac runs publish both darwin-arm64 and darwin-x64; linux/win
          # publish a single x64 build. Each staging dir is authoritative
          # for exactly one target arch.
          shopt -s nullglob
          any=0
          for dir in apps/editor/desktop-dist-*; do
            [ -d "$dir" ] || continue
            arch=${dir##*desktop-dist-}
            src_name="tagma-editor-server"
            dest_name="tagma-editor-server-${version}-${node_platform}-${arch}"
            if [ "$node_platform" = "win32" ]; then
              src_name="${src_name}.exe"
              dest_name="${dest_name}.exe"
            fi
            src="${dir}/${src_name}"
            dest="${out}/${dest_name}"
            if [ ! -f "$src" ]; then
              echo "skip $dir — no ${src_name}"
              continue
            fi
            cp "$src" "$dest"
            sha=$(shasum -a 256 "$dest" | awk '{print $1}')
            echo "$sha  $(basename "$dest")" > "${dest}.sha256"
            echo "wrote $dest (sha256=$sha)"
            any=1
          done
          if [ "$any" = "0" ]; then
            echo "no desktop-dist-* dirs found — sidecar staging step must run first"
            exit 1
          fi

      - name: Package (${{ matrix.platform }})
        working-directory: apps/electron
        env:
          # When no signing cert is provided, tell electron-builder not to
          # probe the keychain — otherwise it fails fast on macOS runners.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: electron-builder
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx --yes electron-builder --${{ matrix.platform }} --publish=never

      - name: Compute checksums
        shell: bash
        run: node scripts/release/compute-checksums.mjs apps/electron/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.platform }}
          path: |
            apps/electron/release/Tagma-*.dmg
            apps/electron/release/Tagma-*.exe
            apps/electron/release/Tagma-*.AppImage
            apps/electron/release/Tagma-*.deb
            apps/electron/release/Tagma-*.rpm
            apps/electron/release/Tagma-*.tar.gz
            apps/electron/release/Tagma-*.sha256
            apps/electron/release/latest*.yml
            apps/electron/release/*.blockmap
            apps/electron/release/editor-dist-*.tar.gz
            apps/electron/release/editor-dist-*.tar.gz.sha256
            apps/electron/release/editor-dist.hash
            apps/electron/release/tagma-editor-server-*
            apps/electron/release/tagma-editor-server-*.sha256
          if-no-files-found: ignore

  # Assemble the release payload (flatten, verify, build manifest + notes).
  # Still no writes to any remote — the actual tag + GitHub Release happen
  # in finalize so they only exist if this job also succeeded.
  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.prepare.outputs.version }}
      channel: ${{ steps.ch.outputs.channel }}
      prerelease: ${{ steps.ch.outputs.prerelease }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop

      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          # Need full history + tags so the min-shell gate below can diff the
          # electron IPC surface between the prior desktop-v tag and the apps
          # SHA prepare pinned.
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: release-assets

      # Overlay the prepared CHANGELOG so channel-info.mjs can read the new
      # release's channel frontmatter. package.json isn't needed here — the
      # publish steps key off prepare's version output, not the file.
      - name: Overlay prepared CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/electron/CHANGELOG
          cp release-assets/prepared/CHANGELOG/*.md apps/electron/CHANGELOG/

      # Enforces the "Linux hot-update tarball == Windows/Mac bundled dist"
      # invariant before anything gets flattened into the release. Runs here
      # (not in build) because the matrix jobs don't see each other's output.
      - name: Verify editor dist hashes match across OS
        shell: bash
        run: |
          set -euo pipefail
          mac=$(cat release-assets/dist-mac/editor-dist.hash 2>/dev/null || true)
          win=$(cat release-assets/dist-win/editor-dist.hash 2>/dev/null || true)
          linux=$(cat release-assets/dist-linux/editor-dist.hash 2>/dev/null || true)
          if [ -z "$mac" ] || [ -z "$win" ] || [ -z "$linux" ]; then
            echo "missing editor-dist.hash from one or more platforms:"
            echo "  mac:   '${mac:-<missing>}'"
            echo "  win:   '${win:-<missing>}'"
            echo "  linux: '${linux:-<missing>}'"
            exit 1
          fi
          if [ "$mac" != "$linux" ] || [ "$win" != "$linux" ]; then
            echo "editor-dist hash mismatch across OS runners:"
            echo "  mac:   $mac"
            echo "  win:   $win"
            echo "  linux: $linux"
            echo ""
            echo "Windows/Mac installers would bundle a different editor-dist"
            echo "than the Linux hot-update tarball. Fix the source of"
            echo "divergence (vite plugin or dep with OS-specific output)"
            echo "before re-tagging this release."
            exit 1
          fi
          echo "editor-dist hash: $linux (matches across mac/win/linux)"

      - name: Flatten assets
        run: |
          mkdir -p flat
          # Exclude editor-dist.hash: its job ended at the verify step above,
          # and three identical copies would collide on flatten anyway.
          # Exclude the prepared/ artifact: it's staging metadata for
          # finalize, not a release asset.
          find release-assets -type f \
            ! -name 'editor-dist.hash' \
            ! -path 'release-assets/prepared/*' \
            -exec cp {} flat/ \;
          ls -la flat

      - name: Channel info
        id: ch
        run: |
          node scripts/release/channel-info.mjs "apps/electron/CHANGELOG/${{ needs.prepare.outputs.version }}.md" >> "$GITHUB_OUTPUT"

      # Auto-derive whether this release requires a newer installer. Two
      # surfaces can make a new hot-update payload incompatible with an older
      # installer:
      #
      #   1. The Electron shell itself (main / preload / runtime-paths):
      #      preload bridge calls, IPC handlers, or env vars the renderer
      #      reads through runtime-paths. If the installer's preload doesn't
      #      expose a method the new bundle calls, or runtime-paths doesn't
      #      set a TAGMA_* env the new sidecar reads, things break.
      #
      #   2. Sidecar <-> renderer/manifest contract (editor-dist and sidecar
      #      hot-update endpoints, the static-assets resolution order, and the
      #      shared manifest validator). Sidecar can now hot-update itself,
      #      but only after the user clicks Update — until then the shipped
      #      sidecar has to stay compatible with the new renderer and new
      #      manifest. A protocol break here leaves the update button wedged.
      #
      # Heuristic is intentionally conservative (file-touched, not signature
      # diff): internal refactors inside these files that don't change the
      # renderer contract will still bump the gate. False positive cost is
      # one forced reinstall; false negative cost is a black-screen like the
      # one that motivated this gate. We err towards the former.
      - name: Determine min-shell version (IPC surface gate)
        id: shell_gate
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          prev_tag="${{ needs.prepare.outputs.prev_tag }}"
          cur_apps_sha="${{ needs.prepare.outputs.apps_sha }}"

          if [ -z "$prev_tag" ]; then
            echo "no prior desktop-v tag — first release, omitting min-shell"
            echo "min_shell=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "diffing ${prev_tag} → apps@${cur_apps_sha}"

          # The prior tag still exists in mono; resolve its apps submodule
          # pointer. The current side uses prepare's pinned SHA rather than a
          # new tag (the tag won't exist until finalize).
          prev_apps_sha=$(git rev-parse "${prev_tag}:apps")
          echo "apps submodule: ${prev_apps_sha} → ${cur_apps_sha}"
          if [ "$prev_apps_sha" = "$cur_apps_sha" ]; then
            echo "submodule pointer unchanged; no IPC surface change possible"
            echo "min_shell=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # actions/checkout only fetches the currently-pinned submodule
          # commit; neither side of the diff is guaranteed to be in the local
          # object DB. Try targeted fetches first (cheap when the server
          # allows it), fall back to a full fetch so `git diff` can always
          # resolve both sides.
          git -C apps fetch --no-tags origin "$prev_apps_sha" 2>/dev/null \
            || git -C apps fetch --no-tags origin
          git -C apps fetch --no-tags origin "$cur_apps_sha" 2>/dev/null || true

          changed=$(git -C apps diff --name-only "$prev_apps_sha" "$cur_apps_sha" -- \
            electron/src/main.ts \
            electron/src/preload.ts \
            electron/src/runtime-paths.ts \
            editor/server/routes/editor.ts \
            editor/server/routes/sidecar.ts \
            editor/server/static-assets.ts \
            editor/server/update-manifest.ts)
          if [ -n "$changed" ]; then
            echo "compat surface files touched:"
            printf '  %s\n' $changed
            echo "→ hot-update manifest will require installer >= ${version}"
            echo "min_shell=${version}" >> "$GITHUB_OUTPUT"
          else
            echo "electron shell + editor/server compat surface unchanged"
            echo "min_shell=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build editor hot-update manifest
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "${{ needs.prepare.outputs.version }}"
            "${{ steps.ch.outputs.channel }}"
            flat
            "${{ github.repository }}"
            "flat/editor-hotupdate-manifest.json"
          )
          min_shell="${{ steps.shell_gate.outputs.min_shell }}"
          if [ -n "$min_shell" ]; then
            args+=(--min-shell "$min_shell")
          fi
          node scripts/release/build-hotupdate-manifest.mjs "${args[@]}"

      # Handed off to sync-web via an artifact so the two jobs ship literally
      # the same bytes to GitHub Releases and tagma-web/public/editor-updates/.
      - name: Upload hot-update manifest as artifact
        uses: actions/upload-artifact@v6
        with:
          name: hotupdate-manifest
          path: flat/editor-hotupdate-manifest.json
          if-no-files-found: error

      - name: Build release notes
        run: |
          node scripts/release/build-release-notes.mjs "${{ needs.prepare.outputs.version }}" flat > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      # Handoff to finalize: the flattened release directory and the release
      # notes. Finalize re-downloads and attaches them to `gh release create`.
      - name: Upload release payload
        uses: actions/upload-artifact@v6
        with:
          name: release-payload
          path: |
            flat/**
            RELEASE_NOTES.md
          if-no-files-found: error

  # The only job that writes to any remote. Runs only if prepare+build+publish
  # all succeeded, so a failure anywhere in the pipeline leaves the version
  # number and git history untouched.
  finalize:
    needs: [prepare, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop

      # Fresh checkout of main so any unrelated commits that landed during
      # build don't block our fast-forward push. The commit we're about to
      # create only touches `apps` (submodule pointer), so replaying on top
      # of newer mono commits is safe.
      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          name: prepared
          path: overlay

      - uses: actions/download-artifact@v7
        with:
          name: release-payload
          path: release-payload

      - name: Commit version bump to tagma-desktop
        id: stage1
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          prepared_apps_sha="${{ needs.prepare.outputs.apps_sha }}"

          git -C apps config user.name "Tagma Release Bot"
          git -C apps config user.email "release-bot@users.noreply.github.com"
          git -C apps fetch origin main

          # Idempotency: if a previous finalize attempt already pushed the
          # bump (e.g. stage 2 failed and the operator is re-running), don't
          # create a duplicate commit. Check whether origin/main's electron
          # package.json already carries the target version.
          remote_version=$(git -C apps show origin/main:electron/package.json | node -e "
            let s=''; process.stdin.on('data',c=>s+=c).on('end',()=>{
              try { console.log(JSON.parse(s).version); } catch { process.exit(1); }
            });
          ")
          if [ "$remote_version" = "$version" ]; then
            new_apps_sha=$(git -C apps rev-parse origin/main)
            echo "tagma-desktop/main already at v$version (sha=$new_apps_sha) — skipping commit"
            echo "new_apps_sha=$new_apps_sha" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Normal path: reset the submodule worktree to the SHA prepare
          # captured, apply the overlay on top, commit, push.
          git -C apps fetch --no-tags origin "$prepared_apps_sha" 2>/dev/null \
            || git -C apps fetch --no-tags origin
          git -C apps checkout "$prepared_apps_sha"

          cp overlay/package.json apps/electron/package.json
          mkdir -p apps/electron/CHANGELOG
          cp overlay/CHANGELOG/*.md apps/electron/CHANGELOG/

          git -C apps add electron/package.json "electron/CHANGELOG/${version}.md"
          git -C apps commit -m "chore(desktop): cut v${version}"
          # Try fast-forward first; if origin/main moved between prepare and
          # finalize, rebase the version-bump commit onto it and retry. The
          # bump only touches electron/package.json + a new CHANGELOG/<ver>.md,
          # so rebase can only conflict if someone else pushed the same version
          # bump — a legitimate failure worth surfacing. Mirrors stage2's
          # rebase-retry on tagma-mono (below).
          if ! git -C apps push origin HEAD:main; then
            echo "fast-forward push failed; rebasing onto origin/main and retrying"
            git -C apps fetch origin main
            git -C apps rebase origin/main
            git -C apps push origin HEAD:main
          fi
          new_apps_sha=$(git -C apps rev-parse HEAD)
          echo "pushed tagma-desktop/main @ $new_apps_sha"
          echo "new_apps_sha=$new_apps_sha" >> "$GITHUB_OUTPUT"

      - name: Commit submodule bump, tag, push to tagma-mono
        id: stage2
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          new_apps_sha="${{ steps.stage1.outputs.new_apps_sha }}"
          tag="desktop-v${version}"

          git config user.name "Tagma Release Bot"
          git config user.email "release-bot@users.noreply.github.com"

          # Move submodule pointer to the freshly-pushed tagma-desktop SHA.
          git -C apps fetch --no-tags origin "$new_apps_sha" 2>/dev/null \
            || git -C apps fetch --no-tags origin
          git -C apps checkout "$new_apps_sha"

          # Idempotency: if the tag already exists on the remote (previous
          # attempt got this far), don't try to commit or re-tag. Just use
          # the existing tag's commit as the release target.
          if git ls-remote --tags --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists on remote — reusing"
            git fetch origin "refs/tags/${tag}:refs/tags/${tag}"
            target_sha=$(git rev-parse "${tag}^{commit}")
            echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Create the bump commit. If the submodule diff is empty (someone
          # else already bumped it to the same SHA), skip the commit and tag
          # the current HEAD.
          git add apps
          if git diff --cached --quiet; then
            echo "submodule pointer unchanged; tagging current HEAD"
            target_sha=$(git rev-parse HEAD)
          else
            git commit -m "chore(desktop): cut v${version}"
            target_sha=$(git rev-parse HEAD)
          fi

          git tag "$tag" "$target_sha"
          # Push the commit first so the tag has a reachable target on the
          # remote. If the commit push fails (main moved), retry once after
          # rebasing onto origin/main — the only change we introduce is the
          # submodule pointer, which should not conflict with unrelated work.
          if ! git push origin "HEAD:main"; then
            echo "fast-forward push failed; rebasing onto origin/main and retrying"
            git fetch origin main
            git rebase origin/main
            git push origin "HEAD:main"
            target_sha=$(git rev-parse HEAD)
            git tag -f "$tag" "$target_sha"
          fi
          git push origin "$tag"
          echo "pushed tagma-mono main + tag ${tag} @ $target_sha"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.stage2.outputs.tag }}"
          target_sha="${{ steps.stage2.outputs.target_sha }}"
          # Idempotency: reuse an existing release if a previous attempt
          # already created it — upload (or overwrite) the assets instead.
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "release $tag already exists — uploading/overwriting assets"
            gh release upload "$tag" release-payload/flat/* \
              --repo "${{ github.repository }}" \
              --clobber
            exit 0
          fi
          args=()
          if [ "${{ needs.publish.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "$tag" \
            --title "Tagma Desktop ${{ needs.prepare.outputs.version }}" \
            --notes-file release-payload/RELEASE_NOTES.md \
            --target "$target_sha" \
            --repo "${{ github.repository }}" \
            "${args[@]}" \
            release-payload/flat/*

  sync-web:
    needs: [prepare, publish, finalize]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop
            tagma-web

      - name: Checkout tagma-mono
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          path: mono

      - name: Checkout tagma-web
        uses: actions/checkout@v5
        with:
          repository: GoTagma/tagma-web
          token: ${{ steps.app-token.outputs.token }}
          path: web

      # Downloads every artifact uploaded by build (dist-mac/linux/win) and
      # publish (hotupdate-manifest) into web-release-assets/<name>/... —
      # the flatten step below collapses them into a single flat/ dir so the
      # sync script can find everything by name.
      - uses: actions/download-artifact@v7
        with:
          path: web-release-assets

      - name: Flatten assets
        run: |
          mkdir -p flat
          # Exclude staging artifacts (prepared/, release-payload/) — they're
          # for finalize, not web.
          find web-release-assets -type f \
            ! -path 'web-release-assets/prepared/*' \
            ! -path 'web-release-assets/release-payload/*' \
            -exec cp {} flat/ \;

      # sync-web's tagma-mono checkout is pinned to github.sha (the commit that
      # triggered the workflow), so the apps submodule is at the PRE-finalize
      # pointer — the new CHANGELOG/<version>.md that finalize just pushed to
      # tagma-desktop/main isn't reachable from here. Overlay the prepared
      # CHANGELOG (same artifact publish uses) so sync-tagma-web.mjs can read
      # it. Mirrors publish's "Overlay prepared CHANGELOG" step.
      - name: Overlay prepared CHANGELOG into mono checkout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p mono/apps/electron/CHANGELOG
          cp web-release-assets/prepared/CHANGELOG/*.md mono/apps/electron/CHANGELOG/

      - name: Run sync script
        run: node mono/scripts/release/sync-tagma-web.mjs "${{ needs.publish.outputs.version }}" mono web flat

      - name: Commit and push
        working-directory: web
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "Tagma Release Bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to sync"
            exit 0
          fi
          git commit -m "chore: sync desktop v${{ needs.publish.outputs.version }}"
          # Query the default branch via the API. actions/checkout@v5 does NOT
          # configure refs/remotes/origin/HEAD (only `git clone` does), so
          # `git rev-parse --abbrev-ref origin/HEAD` silently falls back to the
          # literal "HEAD" and would push to a phantom branch named HEAD.
          default_branch=$(gh api "repos/${{ github.repository_owner }}/tagma-web" --jq .default_branch)
          if [ -z "$default_branch" ] || [ "$default_branch" = "HEAD" ]; then
            echo "could not determine tagma-web default branch (got: '$default_branch')"
            exit 1
          fi
          echo "pushing to $default_branch"
          git push origin "HEAD:refs/heads/$default_branch"
