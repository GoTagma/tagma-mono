name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        options: [patch, minor, major]
        default: patch
      channel:
        description: 'Release channel'
        type: choice
        options: [alpha, beta, rc, stable, patch]
        default: alpha
      expected_apps_sha:
        description: 'Optional: tagma-desktop/main SHA you expect to release (7+ chars or full). Aborts if origin/main has moved since. Leave empty to accept current HEAD.'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  # Convenience path: bump version, scaffold changelog, commit, tag, push.
  # The tag push re-enters this workflow via the tag trigger.
  cut-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match `packageManager` in root package.json. Avoid
          # `latest` so a freshly published Bun build with a broken
          # cross-target runtime (e.g. v1.3.12 windows-x64-baseline extract
          # failure) can't take the release pipeline down without warning.
          bun-version: 1.3.11

      # The submodule was checked out at whatever SHA mono's main currently
      # pins, which may lag tagma-desktop/main. Fast-forward to the latest
      # so the version bump lands on top of real HEAD and the subsequent
      # `git push origin HEAD:main` stays a fast-forward.
      - name: Sync submodule to latest tagma-desktop/main
        run: |
          git -C apps fetch origin main
          git -C apps checkout main
          git -C apps reset --hard origin/main
          echo "tagma-desktop/main is at $(git -C apps rev-parse HEAD)"

      # Optional tripwire: operator passes a SHA from their local `git -C apps
      # rev-parse main` before clicking Run workflow. If anyone else pushed to
      # tagma-desktop/main between that check and this job, the reset above
      # would silently pull in the extra commits. Fail instead so the operator
      # can review the new commits and re-trigger with an updated SHA.
      - name: Verify tagma-desktop/main matches expected SHA
        if: inputs.expected_apps_sha != ''
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ inputs.expected_apps_sha }}"
          n=${#expected}
          if [ "$n" -lt 7 ]; then
            echo "expected_apps_sha must be at least 7 chars (got: '$expected')"
            exit 1
          fi
          actual=$(git -C apps rev-parse HEAD)
          if [ "${actual:0:$n}" != "$expected" ]; then
            echo "tagma-desktop/main HEAD is $actual"
            echo "expected                  $expected"
            echo ""
            echo "Someone pushed to tagma-desktop/main after you captured the"
            echo "expected SHA. Inspect the new commits and re-run the workflow"
            echo "with the updated SHA, or leave expected_apps_sha empty to"
            echo "accept the current HEAD unconditionally."
            exit 1
          fi
          echo "tagma-desktop/main @ $actual matches expected $expected"

      - name: Bump desktop version
        id: bump
        working-directory: apps/electron
        run: |
          bun pm version ${{ inputs.bump }} --no-git-tag-version
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Write the release channel into tagma.channel so the packaged
      # installer polls the correct hot-update manifest URL
      # (editor-updates/<channel>/manifest.json). Without this, every
      # installer — including alpha/beta builds — would stay on the default
      # "stable" channel from the checked-in package.json and never see
      # prerelease hot-updates. `patch` collapses to `stable` for the same
      # reason channel-info.mjs does: a patch release must reach stable
      # installers, not a phantom "patch" channel.
      - name: Pin release channel into package.json
        working-directory: apps/electron
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            p.tagma = p.tagma || {};
            const raw = process.env.INPUT_CHANNEL;
            p.tagma.channel = raw === 'patch' ? 'stable' : raw;
            fs.writeFileSync('./package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Scaffold changelog entry
        run: |
          version="${{ steps.bump.outputs.version }}"
          date=$(date -u +%Y-%m-%d)
          mkdir -p apps/electron/CHANGELOG
          file="apps/electron/CHANGELOG/${version}.md"
          if [ ! -f "$file" ]; then
            cat > "$file" <<EOF
          ---
          version: "${version}"
          date: "${date}"
          channel: "${{ inputs.channel }}"
          ---
          EOF
          fi

      # Two-stage commit: first push the electron version+changelog into the
      # tagma-desktop submodule, then bump the submodule pointer in tagma-mono
      # and push the desktop-v* tag. Keeping the tag in tagma-mono means the
      # build/publish/sync-web jobs below continue to key off the mono tag push.
      - name: Commit, tag, push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          version="${{ steps.bump.outputs.version }}"
          git config user.name "Tagma Release Bot"
          git config user.email "release-bot@users.noreply.github.com"

          # Stage 1 — submodule (tagma-desktop): commit version + changelog
          git -C apps config user.name "Tagma Release Bot"
          git -C apps config user.email "release-bot@users.noreply.github.com"
          git -C apps add electron/package.json "electron/CHANGELOG/${version}.md"
          git -C apps commit -m "chore(desktop): cut v${version}"
          git -C apps push origin HEAD:main

          # Stage 2 — mono: bump submodule pointer, commit, tag, push
          git add apps
          git commit -m "chore(desktop): cut v${version}"
          git tag "desktop-v${version}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "desktop-v${version}"

  build:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match `packageManager` in root package.json. Avoid
          # `latest` so a freshly published Bun build with a broken
          # cross-target runtime (e.g. v1.3.12 windows-x64-baseline extract
          # failure) can't take the release pipeline down without warning.
          bun-version: 1.3.11

      - name: Clean build artifacts
        # Wipe any stale editor/dist and desktop-dist from a previous workflow
        # run on the same runner VM. Without this, a Windows runner that ran
        # an earlier build would have a dirty editor/dist whose hash collides
        # with the fresh mac/linux builds — causing the publish hash check to
        # fire falsely.
        shell: bash
        run: |
          rm -rf apps/editor/dist apps/editor/desktop-dist apps/electron/dist

      - name: Install deps
        run: bun install

      - name: Switch Bun to baseline runtime (Windows)
        # Bun's own cross-target download fails consistently on Windows GitHub
        # runners with "Failed to extract executable for bun-windows-x64-baseline".
        # The published asset is fine — we verified the zip downloads and unzips
        # cleanly via curl. Replace setup-bun's modern bun.exe with the baseline
        # variant ourselves. After this swap host == target, so Bun.build's
        # cross-target fetch in build-desktop-sidecar.ts becomes a no-op.
        if: matrix.platform == 'win'
        shell: bash
        run: |
          set -euo pipefail
          BUN_VERSION=$(bun --revision | cut -d+ -f1)
          TARGET="bun-windows-x64-baseline"
          URL="https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/${TARGET}.zip"
          echo "Pre-fetching $URL"
          curl -fsSL --retry 3 --retry-delay 5 "$URL" -o /tmp/bun-baseline.zip
          unzip -oq /tmp/bun-baseline.zip -d /tmp/bun-baseline-extracted
          BUN_BIN="$HOME/.bun/bin/bun.exe"
          cp "/tmp/bun-baseline-extracted/${TARGET}/bun.exe" "$BUN_BIN"
          "$BUN_BIN" --revision
          echo "Bun runtime swapped to ${TARGET}-v${BUN_VERSION}"

      - name: Build desktop prerequisites
        # Bun's cross-target compile occasionally lands a truncated zip in its
        # cache and dies with "Failed to extract executable" before the script
        # can catch it. Retry up to 3 times, wiping any stale baseline cache
        # entries between attempts.
        shell: bash
        run: |
          attempt=1
          max=3
          while [ "$attempt" -le "$max" ]; do
            echo "── build:desktop attempt $attempt/$max ──"
            if bun run build:desktop; then
              echo "build:desktop succeeded on attempt $attempt"
              exit 0
            fi
            echo "build:desktop attempt $attempt failed"
            if [ "$attempt" -lt "$max" ]; then
              find "$HOME/.bun" -maxdepth 6 \( -iname "bun-*-baseline-v*" -o -iname "bun-windows-x64-v*" -o -iname "bun-linux-x64-v*" \) -print -exec rm -rf {} + 2>/dev/null || true
              sleep $((attempt * 5))
            fi
            attempt=$((attempt + 1))
          done
          echo "build:desktop exhausted retries"
          exit 1

      # Hash the editor dist tree on every runner and ship the digest in the
      # artifact. The publish job compares the three and fails if they
      # diverge — that protects the "one Linux-built hot-update tarball is
      # equivalent to what Windows/Mac installers bundle" assumption.
      - name: Hash editor dist (cross-OS verification)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apps/electron/release
          node scripts/release/hash-editor-dist.mjs apps/editor/dist > apps/electron/release/editor-dist.hash
          echo "editor-dist hash (${{ matrix.platform }}): $(cat apps/electron/release/editor-dist.hash)"

      # ── Hot-update payload ──
      # Every desktop release also ships an editor-dist tarball that the
      # running app can pull down on demand (see server/routes/editor.ts).
      # Built on Linux only: `bun run build:desktop` produces identical
      # apps/editor/dist on every runner (pure JS), so one tarball is
      # enough and we avoid publishing three byte-divergent copies.
      # The cross-OS hash check above enforces that invariant.
      - name: Package editor hot-update tarball
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#desktop-v}"
          out="apps/electron/release"
          mkdir -p "$out"
          tarball="$out/editor-dist-${version}.tar.gz"
          tar -czf "$tarball" -C apps/editor/dist .
          sha=$(shasum -a 256 "$tarball" | awk '{print $1}')
          echo "$sha  $(basename "$tarball")" > "${tarball}.sha256"
          echo "wrote $tarball (sha256=$sha)"

      - name: Package (${{ matrix.platform }})
        working-directory: apps/electron
        env:
          # When no signing cert is provided, tell electron-builder not to
          # probe the keychain — otherwise it fails fast on macOS runners.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: electron-builder
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx --yes electron-builder --${{ matrix.platform }} --publish=never

      - name: Compute checksums
        shell: bash
        run: node scripts/release/compute-checksums.mjs apps/electron/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            apps/electron/release/Tagma-*.dmg
            apps/electron/release/Tagma-*.exe
            apps/electron/release/Tagma-*.AppImage
            apps/electron/release/Tagma-*.deb
            apps/electron/release/Tagma-*.rpm
            apps/electron/release/Tagma-*.tar.gz
            apps/electron/release/Tagma-*.sha256
            apps/electron/release/latest*.yml
            apps/electron/release/*.blockmap
            apps/electron/release/editor-dist-*.tar.gz
            apps/electron/release/editor-dist-*.tar.gz.sha256
            apps/electron/release/editor-dist.hash
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.ch.outputs.channel }}
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          # Need full history + tags so the min-shell gate below can diff the
          # electron IPC surface between this tag and the prior desktop-v tag.
          # Shallow (default depth=1) wouldn't even let us enumerate old tags.
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      # Enforces the "Linux hot-update tarball == Windows/Mac bundled dist"
      # invariant before anything gets flattened into the release. Runs here
      # (not in build) because the matrix jobs don't see each other's output.
      - name: Verify editor dist hashes match across OS
        shell: bash
        run: |
          set -euo pipefail
          mac=$(cat release-assets/dist-mac/editor-dist.hash 2>/dev/null || true)
          win=$(cat release-assets/dist-win/editor-dist.hash 2>/dev/null || true)
          linux=$(cat release-assets/dist-linux/editor-dist.hash 2>/dev/null || true)
          if [ -z "$mac" ] || [ -z "$win" ] || [ -z "$linux" ]; then
            echo "missing editor-dist.hash from one or more platforms:"
            echo "  mac:   '${mac:-<missing>}'"
            echo "  win:   '${win:-<missing>}'"
            echo "  linux: '${linux:-<missing>}'"
            exit 1
          fi
          if [ "$mac" != "$linux" ] || [ "$win" != "$linux" ]; then
            echo "editor-dist hash mismatch across OS runners:"
            echo "  mac:   $mac"
            echo "  win:   $win"
            echo "  linux: $linux"
            echo ""
            echo "Windows/Mac installers would bundle a different editor-dist"
            echo "than the Linux hot-update tarball. Fix the source of"
            echo "divergence (vite plugin or dep with OS-specific output)"
            echo "before re-tagging this release."
            exit 1
          fi
          echo "editor-dist hash: $linux (matches across mac/win/linux)"

      - name: Flatten assets
        run: |
          mkdir -p flat
          # Exclude editor-dist.hash: its job ended at the verify step above,
          # and three identical copies would collide on flatten anyway.
          find release-assets -type f ! -name 'editor-dist.hash' -exec cp {} flat/ \;
          ls -la flat

      - name: Extract version from tag
        id: meta
        run: |
          version="${GITHUB_REF_NAME#desktop-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Channel info
        id: ch
        run: |
          node scripts/release/channel-info.mjs "apps/electron/CHANGELOG/${{ steps.meta.outputs.version }}.md" >> "$GITHUB_OUTPUT"

      # Auto-derive whether this release requires a newer installer. When the
      # electron-side IPC surface (preload bridge, main-process handlers, env
      # vars the renderer reads through runtime-paths) has changed since the
      # previous desktop-v tag, a newer editor bundle can't be trusted to work
      # against an older shell — the old shell's preload won't expose a method
      # the new bundle calls at module-load, or TAGMA_EDITOR_* envs it expects
      # won't be set, etc. Gate the hot-update on the installer so affected
      # users get redirected to a reinstall (see editor.ts:315).
      #
      # Heuristic is intentionally conservative (file-touched, not signature
      # diff): internal refactors inside these three files that don't change
      # the renderer contract will still bump the gate. False positive cost is
      # one forced reinstall; false negative cost is a black-screen like the
      # one that motivated this gate. We err towards the former.
      - name: Determine min-shell version (IPC surface gate)
        id: shell_gate
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#desktop-v}"
          # Previous desktop-v tag, semver-ordered. --sort=-version:refname
          # handles 0.1.10 > 0.1.9 correctly. Exclude the tag we're publishing
          # in case the workflow was re-run against an existing tag.
          prev_tag=$(git tag --list 'desktop-v*' --sort=-version:refname \
            | grep -vx -- "${GITHUB_REF_NAME}" | head -1 || true)
          if [ -z "$prev_tag" ]; then
            echo "no prior desktop-v tag — first release, omitting min-shell"
            echo "min_shell=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "diffing ${prev_tag} → ${GITHUB_REF_NAME}"

          # apps/ is a submodule; `<tag>:apps` is the commit SHA the mono tag
          # pinned in tagma-desktop. Diff happens inside that submodule repo
          # where our files live at electron/src/ (no apps/ prefix).
          prev_apps_sha=$(git rev-parse "${prev_tag}:apps")
          cur_apps_sha=$(git rev-parse "${GITHUB_REF_NAME}:apps")
          echo "apps submodule: ${prev_apps_sha} → ${cur_apps_sha}"
          if [ "$prev_apps_sha" = "$cur_apps_sha" ]; then
            echo "submodule pointer unchanged; no IPC surface change possible"
            echo "min_shell=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # actions/checkout only fetches the currently-pinned submodule
          # commit; the prior-tag SHA may not be in the local object DB yet.
          # Try a targeted fetch first (cheap when server allows it), fall
          # back to a full fetch so `git diff` can always resolve both sides.
          git -C apps fetch --no-tags origin "$prev_apps_sha" 2>/dev/null \
            || git -C apps fetch --no-tags origin

          changed=$(git -C apps diff --name-only "$prev_apps_sha" "$cur_apps_sha" -- \
            electron/src/main.ts \
            electron/src/preload.ts \
            electron/src/runtime-paths.ts)
          if [ -n "$changed" ]; then
            echo "IPC surface files touched:"
            printf '  %s\n' $changed
            echo "→ hot-update manifest will require installer >= ${version}"
            echo "min_shell=${version}" >> "$GITHUB_OUTPUT"
          else
            echo "electron/src/{main,preload,runtime-paths}.ts unchanged"
            echo "min_shell=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build editor hot-update manifest
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "${{ steps.meta.outputs.version }}"
            "${{ steps.ch.outputs.channel }}"
            flat
            "${{ github.repository }}"
            "flat/editor-hotupdate-manifest.json"
          )
          min_shell="${{ steps.shell_gate.outputs.min_shell }}"
          if [ -n "$min_shell" ]; then
            args+=(--min-shell "$min_shell")
          fi
          node scripts/release/build-hotupdate-manifest.mjs "${args[@]}"

      # Handed off to sync-web via an artifact so the two jobs ship literally
      # the same bytes to GitHub Releases and tagma-web/public/editor-updates/.
      # Previously sync-web regenerated the manifest from the same inputs;
      # that worked but drifted away from the "single source of truth"
      # principle — any future change to build-hotupdate-manifest.mjs only
      # had to be applied in one place but could accidentally be called with
      # different args in the other.
      - name: Upload hot-update manifest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hotupdate-manifest
          path: flat/editor-hotupdate-manifest.json
          if-no-files-found: error

      - name: Build release notes
        run: |
          node scripts/release/build-release-notes.mjs "${{ steps.meta.outputs.version }}" flat > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          args=()
          if [ "${{ steps.ch.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "Tagma Desktop ${{ steps.meta.outputs.version }}" \
            --notes-file RELEASE_NOTES.md \
            --repo "${{ github.repository }}" \
            "${args[@]}" \
            flat/*

  sync-web:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            tagma-mono
            tagma-desktop
            tagma-web

      - name: Checkout tagma-mono
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive
          path: mono

      - name: Checkout tagma-web
        uses: actions/checkout@v4
        with:
          repository: GoTagma/tagma-web
          token: ${{ steps.app-token.outputs.token }}
          path: web

      # Downloads every artifact uploaded by build (dist-mac/linux/win) and
      # publish (hotupdate-manifest) into web-release-assets/<name>/... —
      # the flatten step below collapses them into a single flat/ dir so the
      # sync script can find everything by name.
      - uses: actions/download-artifact@v4
        with:
          path: web-release-assets

      - name: Flatten assets
        run: |
          mkdir -p flat
          find web-release-assets -type f -exec cp {} flat/ \;

      - name: Run sync script
        run: node mono/scripts/release/sync-tagma-web.mjs "${{ needs.publish.outputs.version }}" mono web flat

      - name: Commit and push
        working-directory: web
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "Tagma Release Bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to sync"
            exit 0
          fi
          git commit -m "chore: sync desktop v${{ needs.publish.outputs.version }}"
          # Query the default branch via the API. actions/checkout@v4 does NOT
          # configure refs/remotes/origin/HEAD (only `git clone` does), so
          # `git rev-parse --abbrev-ref origin/HEAD` silently falls back to the
          # literal "HEAD" and would push to a phantom branch named HEAD.
          default_branch=$(gh api "repos/${{ github.repository_owner }}/tagma-web" --jq .default_branch)
          if [ -z "$default_branch" ] || [ "$default_branch" = "HEAD" ]; then
            echo "could not determine tagma-web default branch (got: '$default_branch')"
            exit 1
          fi
          echo "pushing to $default_branch"
          git push origin "HEAD:refs/heads/$default_branch"
