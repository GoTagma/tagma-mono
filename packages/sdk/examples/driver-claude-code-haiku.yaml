# driver-claude-code-haiku.yaml
# --------------------------------------------------------------------------
# Minimal pipeline using the Claude Code driver with the `haiku` model.
# Claude Code is an external plugin — declare it in `plugins:` to register
# it. (The SDK's built-in driver is `opencode`; all others are plugins.)
#
# Requires:  `claude` CLI on PATH (authenticated).
# --------------------------------------------------------------------------
pipeline:
  name: driver-claude-code-haiku
  mode: trusted
  driver: claude-code
  model: haiku
  timeout: 5m
  plugins:
    - '@tagma/driver-claude-code'

  tracks:
    - id: main
      name: Haiku smoke test
      color: '#f59e0b'
      permissions:
        read: true
        write: false
        execute: false

      tasks:
        - id: say_hello
          name: Ask Haiku to say hello
          prompt: |
            Reply with the single word: HELLO
            Do not add punctuation, quotes, or anything else.
          timeout: 2m
