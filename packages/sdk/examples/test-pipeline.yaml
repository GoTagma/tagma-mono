# End-to-end smoke-test pipeline covering the full plugin surface.
# Only @tagma/driver-opencode is loaded as an external plugin.
# trigger / completion / middleware plugins are all SDK built-ins
# (registered by bootstrapBuiltins).
pipeline:
  name: full-feature-smoke-test
  driver: opencode                # pipeline-level default driver (inherited by track/task)
  model: opencode/big-pickle       # pipeline-level default model (must be provider/model)
  timeout: 30m                    # pipeline-level timeout
  plugins:
    - '@tagma/driver-opencode'    # the only external plugin

  # ---- lifecycle hooks: exercise both single-command and command-array forms ----
  hooks:
    pipeline_start: 'echo "[hook] pipeline_start"'
    task_start: 'echo "[hook] task_start"'
    task_success:
      - 'echo "[hook] task_success #1"'
      - 'echo "[hook] task_success #2"'
    task_failure: 'echo "[hook] task_failure"'
    pipeline_complete: 'echo "[hook] pipeline_complete"'
    pipeline_error: 'echo "[hook] pipeline_error"'

  tracks:
    # =========================================================
    # Track A: AI prompt tasks + various trigger / completion / middleware
    # =========================================================
    - id: backend
      name: Backend
      color: '#3b82f6'
      driver: opencode
      model: opencode/big-pickle
      agent_profile: senior
      cwd: ./                     # track-level working directory
      permissions:
        read: true
        write: true
        execute: false
      on_failure: skip_downstream  # if A fails, skip downstream rather than killing the whole pipeline

      # track-level middleware: applied to every task by default
      middlewares:
        - type: static_context
          file: ./README.md
          label: Project Readme

      tasks:
        # 1) manual approval trigger + exit_code completion
        - id: plan
          name: Plan the change
          prompt: |
            List every file that needs to change to add a /health endpoint
            to src/server.ts.
            Respond with a markdown bullet list only. Do not write code.
          timeout: 5m
          trigger:
            type: manual
            message: 'Approve before running plan step'
            timeout: 2m
            metadata:
              owner: qa
          completion:
            type: exit_code
            expect: 0

        # 2) continue_from session handoff (context flows via the edge)
        #    + task-level middleware override
        - id: implement
          name: Implement /health endpoint
          prompt: 'Based on the previous plan, actually modify the code to implement the /health endpoint.'
          continue_from: plan            # same track, bare reference
          depends_on: [plan]
          # task-level middleware REPLACES (not appends to) the track-level list
          middlewares:
            - type: static_context
              file: ./package.json
              label: Package Manifest
          permissions:                   # task-level permission override
            read: true
            write: true
            execute: true
          completion:
            type: exit_code
            expect: 0

        # 3) disable inherited middleware (empty array) + output_check completion
        - id: review
          name: Self-review the diff
          prompt: 'Self-review the changes you just made. Output a single line starting with PASS or FAIL.'
          continue_from: implement
          depends_on: [implement]
          middlewares: []                # explicitly clear inheritance
          completion:
            type: output_check
            check: 'grep -q "^PASS"'     # stdin receives the task stdout
            timeout: 30s

    # =========================================================
    # Track B: command tasks + file trigger + cross-track dependency
    # =========================================================
    - id: ops
      name: Ops
      color: '#10b981'
      driver: opencode               # unused here (all command tasks) — kept to demo inheritance
      on_failure: ignore             # failures in B do not affect other tracks
      permissions:
        read: true
        write: true
        execute: true

      tasks:
        # 4) plain shell command, no trigger/completion
        - id: prep
          name: Prepare signal dir
          command: 'mkdir -p ./.tagma/signal && echo prepared > ./.tagma/signal/.ready'

        # 5) file trigger: wait for a file to appear before running
        - id: wait-signal
          name: Wait for signal file
          command: 'echo "signal received"'
          depends_on: [prep]
          trigger:
            type: file
            path: ./.tagma/signal/.ready
            timeout: 1m
          completion:
            type: exit_code
            expect: [0]                # array form: multiple acceptable exit codes

        # 6) cross-track dependency & cross-track continue_from (qualified reference)
        - id: summarize
          name: Summarize backend work
          prompt: 'Read the conclusion of backend.review and summarise it in one sentence.'
          depends_on:
            - wait-signal
            - backend.review           # cross-track: trackId.taskId
          continue_from: backend.review
          timeout: 3m
          driver: opencode             # task-level explicit declaration (overrides inheritance)
          model: opencode/big-pickle
          completion:
            type: exit_code
            expect: 0
